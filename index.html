<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parameter Ordering Visualizer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 750px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h3 {
            margin-top: 0;
            color: #1e293b;
            font-size: 1.2rem;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
            text-align: center;
        }
        .builder-area {
            background: #1e293b;
            color: white;
            border-radius: 8px;
            padding: 20px;
            font-family: monospace;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            min-height: 80px;
            transition: all 0.3s;
        }
        .def-text { color: #38bdf8; font-weight: bold; }
        .func-name { color: #fcd34d; }
        .bracket { color: white; font-weight: bold; }
        
        .slot-container {
            display: flex;
            gap: 8px;
            align-items: center;
            min-width: 150px;
            padding: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            border: 1px dashed #64748b;
            flex-wrap: wrap;
        }
        .param-chip {
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .param-chip:hover { transform: translateY(-2px); }
        .param-req { background: #3b82f6; color: white; border: 1px solid #2563eb; }
        .param-opt { background: #10b981; color: white; border: 1px solid #059669; }
        .param-error { background: #ef4444 !important; border-color: #dc2626 !important; animation: shake 0.4s; }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            75% { transform: translateX(-4px); }
            100% { transform: translateX(0); }
        }

        .inventory {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 15px;
        }
        .inventory-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 10px;
        }
        .param-pool {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .pool-btn {
            background: white;
            border: 2px solid #cbd5e1;
            color: #475569;
            padding: 8px 16px;
            border-radius: 6px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pool-btn.req { border-left: 4px solid #3b82f6; }
        .pool-btn.req:hover:not(:disabled) { background: #eff6ff; border-color: #3b82f6; }
        .pool-btn.opt { border-left: 4px solid #10b981; }
        .pool-btn.opt:hover:not(:disabled) { background: #ecfdf5; border-color: #10b981; }
        .pool-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-check {
            background-color: #8b5cf6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 1rem;
        }
        .btn-check:hover { background-color: #7c3aed; }
        .btn-clear {
            background-color: #e2e8f0;
            color: #475569;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-clear:hover { background-color: #cbd5e1; }

        .console {
            background: #0f172a;
            color: #f8fafc;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.95rem;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .console.success { color: #34d399; }
        .console.error { color: #f87171; }
    </style>
</head>
<body>

<div class="container">
    <h3>Function Parameter Syntax Visualizer</h3>
    
    <div class="builder-area" id="builderArea">
        <span class="def-text">def</span> <span class="func-name">analyze_data</span><span class="bracket">(</span>
        <div class="slot-container" id="slotContainer">
            <span style="color: #94a3b8; font-size: 0.9rem;">Click parameters to add...</span>
        </div>
        <span class="bracket">):</span>
    </div>

    <div class="inventory">
        <div class="inventory-title">Available Parameters (Click to add)</div>
        <div class="param-pool">
            <button class="pool-btn req" id="btn-coords" onclick="addParam('coordinates', 'req', 'btn-coords')">coordinates</button>
            <button class="pool-btn req" id="btn-crs" onclick="addParam('crs', 'req', 'btn-crs')">crs</button>
            <button class="pool-btn opt" id="btn-buffer" onclick="addParam('buffer_size=50', 'opt', 'btn-buffer')">buffer_size=50</button>
            <button class="pool-btn opt" id="btn-verbose" onclick="addParam('verbose=True', 'opt', 'btn-verbose')">verbose=True</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn-check" onclick="checkSyntax()">Check Syntax</button>
        <button class="btn-clear" onclick="clearAll()">Clear</button>
    </div>
    
    <div class="console" id="consoleOutput">
        Waiting for function definition...
    </div>
</div>

<script>
    let signature = [];

    function addParam(text, type, btnId) {
        document.getElementById(btnId).disabled = true;
        signature.push({ text, type, btnId, id: Date.now() });
        renderSignature();
        document.getElementById('consoleOutput').className = 'console';
        document.getElementById('consoleOutput').textContent = "Waiting to check syntax...";
        document.getElementById('builderArea').style.borderColor = "transparent";
    }

    function removeParam(index) {
        const param = signature[index];
        document.getElementById(param.btnId).disabled = false;
        signature.splice(index, 1);
        renderSignature();
        document.getElementById('consoleOutput').className = 'console';
        document.getElementById('consoleOutput').textContent = "Waiting to check syntax...";
    }

    function renderSignature() {
        const container = document.getElementById('slotContainer');
        if (signature.length === 0) {
            container.innerHTML = '<span style="color: #94a3b8; font-size: 0.9rem;">Click parameters to add...</span>';
            return;
        }
        
        container.innerHTML = '';
        signature.forEach((p, idx) => {
            const chip = document.createElement('div');
            chip.className = `param-chip param-${p.type}`;
            chip.id = `chip-${idx}`;
            chip.innerHTML = `${p.text} <span style="font-size: 0.7rem; opacity: 0.7;">✕</span>`;
            chip.onclick = () => removeParam(idx);
            
            container.appendChild(chip);
            
            // Add comma if not last
            if (idx < signature.length - 1) {
                const comma = document.createElement('span');
                comma.textContent = ", ";
                comma.style.color = "white";
                container.appendChild(comma);
            }
        });
    }

    function checkSyntax() {
        const consoleOut = document.getElementById('consoleOutput');
        if (signature.length === 0) {
            consoleOut.textContent = "Error: Function has no parameters to check.";
            return;
        }

        let seenOptional = false;
        let errorIndex = -1;

        for (let i = 0; i < signature.length; i++) {
            if (signature[i].type === 'opt') {
                seenOptional = true;
            } else if (signature[i].type === 'req' && seenOptional) {
                errorIndex = i;
                break;
            }
        }

        if (errorIndex !== -1) {
            // Error found
            const badChip = document.getElementById(`chip-${errorIndex}`);
            badChip.classList.add('param-error');
            setTimeout(() => badChip.classList.remove('param-error'), 500);
            
            consoleOut.className = 'console error';
            consoleOut.innerHTML = `SyntaxError: non-default argument '${signature[errorIndex].text}' follows default argument`;
            document.getElementById('builderArea').style.border = "2px solid #ef4444";
        } else {
            // Success
            consoleOut.className = 'console success';
            consoleOut.innerHTML = `✓ Valid Syntax: Required parameters successfully placed before optional parameters.`;
            document.getElementById('builderArea').style.border = "2px solid #10b981";
        }
    }

    function clearAll() {
        signature = [];
        document.querySelectorAll('.pool-btn').forEach(btn => btn.disabled = false);
        renderSignature();
        document.getElementById('consoleOutput').className = 'console';
        document.getElementById('consoleOutput').textContent = "Waiting for function definition...";
        document.getElementById('builderArea').style.border = "2px solid transparent";
    }
</script>

</body>
</html>
